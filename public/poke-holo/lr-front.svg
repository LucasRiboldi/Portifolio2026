<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 921" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35127a"/>
      <stop offset="0.45" stop-color="#4a1a9c"/>
      <stop offset="0.85" stop-color="#6a2fd6"/>
      <stop offset="1" stop-color="#8f2fb8"/>
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="3" fill="#00e5ff" opacity="0.5"/>
    </pattern>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0033"/>
      <stop offset="1" stop-color="#2d0a4d"/>
    </linearGradient>
  </defs>

  <!-- moldura -->
  <rect width="660" height="921" rx="30" fill="#000"/>
  <rect x="10" y="10" width="640" height="901" rx="24" fill="url(#bg)"/>

  <!-- cabeça -->
  <text x="42" y="76" font-size="44" font-weight="900" fill="#fff" letter-spacing="1">LUCAS RIBOLDI</text>
  <text x="618" y="76" font-size="30" font-weight="900" fill="#ffe600" text-anchor="end">PV 2026 ⚡</text>

  <!-- janela de arte (região do clip 9.85%–47.15%) -->
  <g>
    <rect x="52" y="94" width="556" height="336" fill="#000"/>
    <rect x="58" y="100" width="544" height="324" fill="url(#sky)"/>
    <circle cx="500" cy="170" r="52" fill="#ff2d95" opacity="0.55"/>
    <rect x="58" y="100" width="544" height="324" fill="url(#dots)" opacity="0.35"/>
    <g fill="#33004d">
      <rect x="80" y="250" width="86" height="174"/>
      <rect x="190" y="210" width="66" height="214"/>
      <rect x="470" y="230" width="76" height="194"/>
      <rect x="560" y="280" width="42" height="144"/>
    </g>
    <path d="M160 310 L330 208" stroke="#00e5ff" stroke-width="6" stroke-linecap="round" fill="none"/>
    <g fill="#ff2d95">
      <circle cx="340" cy="198" r="24"/>
      <path d="M340 220 L314 278 L336 278 L346 246 L362 278 L382 272 Z"/>
      <path d="M320 230 L278 214 L272 230 L314 250 Z"/>
    </g>
    <g stroke="#ffe600" stroke-width="4" opacity="0.75">
      <path d="M400 150h80M415 172h66M430 194h48"/>
    </g>
  </g>

  <!-- ataques -->
  <text x="52" y="500" font-size="30" font-weight="900" fill="#00e5ff">DESIGN DE PRODUTO</text>
  <text x="52" y="538" font-size="24" fill="#f2eaff">Cria interfaces que comunicam antes de explicar.</text>
  <text x="608" y="500" font-size="34" font-weight="900" fill="#fff" text-anchor="end">30</text>

  <line x1="52" y1="568" x2="608" y2="568" stroke="#000" stroke-width="3" opacity="0.5"/>

  <text x="52" y="618" font-size="30" font-weight="900" fill="#b6ff00">CÓDIGO</text>
  <text x="52" y="656" font-size="24" fill="#f2eaff">Transforma a ideia em coisa navegável.</text>
  <text x="52" y="690" font-size="24" fill="#f2eaff">Efeito colateral: experimentos toda semana.</text>
  <text x="608" y="618" font-size="34" font-weight="900" fill="#fff" text-anchor="end">90</text>

  <!-- caixa de sabor -->
  <rect x="52" y="726" width="556" height="106" fill="#000" opacity="0.25" rx="8"/>
  <text x="66" y="768" font-size="21" font-style="italic" fill="#e8dcff">Avistado saltando entre prédios de Terra-2026 carregando</text>
  <text x="66" y="798" font-size="21" font-style="italic" fill="#e8dcff">um design system debaixo do braço. Aproxime-se com café.</text>

  <!-- rodapé -->
  <line x1="42" y1="856" x2="618" y2="856" stroke="#000" stroke-width="3" opacity="0.4"/>
  <text x="42" y="892" font-size="20" font-weight="700" fill="#d9c9ff">Ilustração: acervo do multiverso</text>
  <text x="618" y="892" font-size="20" font-weight="900" fill="#ff2d95" text-anchor="end">160/159 ★ SECRETA</text>
</svg>
